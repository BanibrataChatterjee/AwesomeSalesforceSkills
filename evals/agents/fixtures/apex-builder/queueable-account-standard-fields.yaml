eval:
  id: apex-builder__queueable-account-standard-fields
  agent: apex-builder
  mode: single
  priority: P0
  last_verified: 2026-04-17
  description: >
    Live-green companion to queueable-account-hierarchy. Uses only
    standard Account fields so the scratch org accepts the emitted
    classes, proving the full five-gate run can reach confidence HIGH
    against a real org (not just the mocked stub).

inputs:
  kind: queueable
  feature_token: AccountIndustryStamp
  feature_summary: "Nightly Account industry stamping job that rewrites the Description when Industry changes across large customer families"
  primary_sobject: Account
  referenced_fields:
    - Account.Industry
    - Account.Description
  api_version: "60.0"
  namespace: ""
  include_logger: true
  test_bulk_size: 200
  async_hint: standard
  target_org_alias: sfskills-dev
  repo_path: ./force-app
  sharing_mode: with_sharing

org_stub:
  org_metadata:
    org_id: 00Dxxx
    edition: Enterprise
    api_version: "60.0"
    sandbox: true
  describe_sobject:
    Account:
      queryable: true
      custom: false
      fields:
        - { name: Id, type: id }
        - { name: Name, type: string }
        - { name: Industry, type: picklist }
        - { name: Description, type: textarea }
  apex_hits: []
  flow_hits: []
  existing_handlers_on_sobject:
    Account:
      - AccountTriggerHandler

expect:
  confidence: HIGH
  gates_passed:
    - inputs
    - requirements
    - ground
    - build
    - seal
  requirements_document_must_reference:
    - "queueable"
    - "Account"
    - "Industry"
    - "ApplicationLogger"
    - "with sharing"
  must_include_deliverables_with_kinds:
    - apex
  deliverables_must_include_classes:
    - AccountIndustryStampQueueable
    - AccountIndustryStampQueueableTest
  must_cite_any_of:
    - { type: skill, id: apex/apex-queueable-patterns }
    - { type: skill, id: apex/async-apex }
    - { type: template, id: apex/BaseService.cls }
    - { type: decision_tree, id: async-selection.md }
  must_not_cite_probes: []
  grounding:
    unresolved_max: 0
  build_gate:
    parse_errors_max: 0
    coverage_min: 85
  process_observations:
    min_count: 1
    categories_present_any_of:
      - healthy
      - concerning
      - ambiguous
  followups_include_any_of:
    - trigger-consolidator
    - test-class-generator
    - soql-optimizer
